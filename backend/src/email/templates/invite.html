<!doctype html>
<html lang="sv">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inbjudan till Hjelm Share</title>
  <style type="text/css">
    body { margin:0 !important; padding:0 !important; background-color:#f5f5f7; -webkit-text-size-adjust:100% !important; }
    table { border-collapse:collapse; }
    img { border:0; display:block; max-width:100%; height:auto; }
    a { color:#1d1d1f; text-decoration:none; }
    .container { font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    @media screen and (max-width:600px) {
      .container { width:100% !important; }
      .inner-padding { padding-left:16px !important; padding-right:16px !important; }
    }
  </style>
</head>
<body style="margin:0; padding:0; background-color:#f5f5f7;">
<div style="display:none; font-size:1px; color:#ffffff; line-height:1px; max-height:0; max-width:0; opacity:0; overflow:hidden; mso-hide:all;">
  Du är inbjuden till Hjelm Share.
</div>
<table width="100%" bgcolor="#f5f5f7" role="presentation">
  <tr><td align="center">
    <table class="container" width="680" role="presentation"
           style="max-width:680px; width:100%; background-color:#ffffff;">

      <tr>
        <td style="padding:24px 40px 16px 40px;">
          <img src="https://order.hjelms.se/img/Hjelms-logo@2x.png" width="220" alt="Hjelms Förlag" />
        </td>
      </tr>

      <tr>
        <td class="inner-padding" style="padding:0 40px 24px 40px;">
          <h1 style="margin:0; font-size:22px; font-weight:600; color:#1d1d1f;">
            Du är inbjuden till Hjelm Share
          </h1>
          <p style="margin:12px 0 0 0; font-size:14px; line-height:20px; color:#515154;">
            Ditt konto är skapat. Logga in med följande uppgifter:
          </p>
        </td>
      </tr>

      <!-- Inloggningsuppgifter -->
      <tr>
        <td class="inner-padding" style="padding:0 40px 24px 40px;">
          <table width="100%" role="presentation"
                 style="background-color:#f5f5f7; border-radius:8px; padding:16px;">
            <tr>
              <td style="padding:12px 16px; font-size:14px; color:#515154; line-height:22px;">
                <strong style="color:#1d1d1f;">E-post:</strong> {email}<br>
                <strong style="color:#1d1d1f;">Lösenord:</strong> {password}
              </td>
            </tr>
          </table>
        </td>
      </tr>

      <tr>
        <td class="inner-padding" style="padding:0 40px 32px 40px;">
          <a href="{url}"
             style="display:inline-block; padding:10px 20px;
                    background-color:#f2f2f2;
                    border:1px solid #d0d0d2;
                    border-radius:4px;
                    font-size:14px; font-weight:500; color:#1d1d1f; text-decoration:none;">
            Logga in →
          </a>
        </td>
      </tr>

      <tr>
        <td style="padding:24px 40px; background-color:#f5f5f7; font-size:12px; color:#8d8d8f; line-height:18px;">
          K. Hjelm Förlag AB · Bolandsgatan 10 · 753 23 Uppsala · Sverige<br>
          Telefon: 018-127888 ·
          <a href="mailto:info@hjelms.se" style="color:#8d8d8f;">info@hjelms.se</a>
        </td>
      </tr>

    </table>
  </td></tr>
</table>
</body>
</html>
